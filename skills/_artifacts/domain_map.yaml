skills:
  - name: 'Configure selective highlighting'
    slug: 'configure-selective-highlighting'
    domain: 'highlighting-configuration'
    description: 'Create an isomorphic highlighter with only the languages needed by a documentation site.'
    type: 'core'
    covers:
      - 'createHighlighter and explicit language registration'
      - 'aliases, fallback behavior, and registry inspection'
      - 'root convenience entry versus isolated language subpaths'
      - 'shared SSR and client registry construction'
    tasks:
      - 'Build a minimal highlighter for a known documentation corpus'
      - 'Share one registry between server rendering and client navigation'
      - 'Choose direct language imports and intentional fallback behavior'
    reference_candidates:
      - topic: 'shipped language names, aliases, and isolated imports'
        reason: 'The package exposes 25 independently importable language definitions with aliases.'
    failure_modes:
      - mistake: 'Importing the root entry in size-sensitive clients'
        mechanism: 'The root entry constructs the all-language registry, so a bound helper retains every shipped language.'
        wrong_pattern: |
          import { highlight } from '@tanstack/highlight'
        correct_pattern: |
          import { createHighlighter } from '@tanstack/highlight/core'
          import { tsx } from '@tanstack/highlight/languages/tsx'

          const highlighter = createHighlighter({ languages: [tsx] })
        source: 'docs/guides/language-registration.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Creating a registry for every code block'
        mechanism: 'Highlighter construction rebuilds immutable name and alias maps without changing per-block behavior.'
        wrong_pattern: |
          function render(code: string) {
            return createHighlighter({ languages: [tsx] }).highlight(code)
          }
        correct_pattern: |
          const highlighter = createHighlighter({ languages: [tsx] })

          function render(code: string) {
            return highlighter.highlight(code, { lang: 'tsx' })
          }
        source: 'docs/guides/language-registration.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Assuming unregistered languages are auto-detected'
        mechanism: 'Language normalization resolves only registered names and aliases, then uses the configured fallback.'
        wrong_pattern: |
          highlighter.highlight(source)
        correct_pattern: |
          highlighter.highlight(source, { lang: 'tsx' })
        source: 'src/core.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Registering different languages on server and client'
        mechanism: 'Registry differences change language normalization and embedded delegation, producing hydration mismatches.'
        wrong_pattern: |
          const languages = typeof window === 'undefined' ? [html, js] : [html]
        correct_pattern: |
          export const highlighter = createHighlighter({ languages: [html, js] })
        source: 'docs/guides/ssr-and-client.md'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['configure-selective-highlighting', 'integrate-framework-code-blocks']
      - mistake: 'Omitting registered languages needed by embedded code'
        mechanism: 'Markup and Markdown tokenizers delegate only when the target language exists in the same registry.'
        wrong_pattern: |
          createHighlighter({ languages: [html] })
        correct_pattern: |
          createHighlighter({ languages: [html, css, js] })
        source: 'docs/guides/embedded-languages.md'
        priority: 'HIGH'
        status: 'active'
        skills: ['configure-selective-highlighting', 'extend-language-support']

  - name: 'Integrate Markdown pipelines'
    slug: 'integrate-markdown-pipelines'
    domain: 'documentation-pipelines'
    description: 'Highlight fenced code through direct helpers, Remark, Rehype, or an existing HAST traversal.'
    type: 'composition'
    covers:
      - 'renderCodeFence and codeFenceToHast'
      - 'Remark structured MDAST-to-HAST transformation'
      - 'Rehype pre/code transformation and idempotence'
      - 'fence titles, line numbers, and annotation metadata'
    tasks:
      - 'Add highlighting before remark-rehype conversion'
      - 'Highlight an existing HAST tree with Rehype'
      - 'Parse documentation fence metadata into shared output'
    subsystems:
      - name: 'Direct fence and HAST helpers'
        package: '@tanstack/highlight/markdown'
        config_surface: 'Code, language, fence metadata, decorations, title, and line numbers.'
      - name: 'Remark'
        package: '@tanstack/highlight/remark'
        config_surface: 'Highlighter plus optional title, decoration, and line-number callbacks.'
      - name: 'Rehype'
        package: '@tanstack/highlight/rehype'
        config_surface: 'Highlighter plus optional title, decoration, and line-number callbacks.'
    compositions:
      - library: 'remark-rehype'
        skill: 'integrate-markdown-pipelines'
      - library: 'rehype'
        skill: 'integrate-markdown-pipelines'
    failure_modes:
      - mistake: 'Using the Markdown language as a pipeline adapter'
        mechanism: 'The Markdown language highlights Markdown source, while the adapters transform fenced blocks in a document tree.'
        wrong_pattern: |
          createHighlighter({ languages: [markdown] })
        correct_pattern: |
          remarkHighlightCodeBlocks({ highlighter })
        source: 'docs/guides/markdown-pipelines.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Running the Remark plugin after remark-rehype'
        mechanism: 'The Remark plugin expects MDAST code nodes and must attach structured HAST data before conversion.'
        wrong_pattern: |
          unified().use(remarkRehype).use(remarkHighlightCodeBlocks({ highlighter }))
        correct_pattern: |
          unified().use(remarkHighlightCodeBlocks({ highlighter })).use(remarkRehype)
        source: 'docs/guides/markdown-pipelines.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Enabling raw HTML for ordinary Remark highlighting'
        mechanism: 'The default Remark transform already supplies structured hName, hProperties, and hChildren data.'
        wrong_pattern: |
          remarkCodeNodeToHtml(node, { highlighter })
        correct_pattern: |
          remarkCodeNodeToMdast(node, { highlighter })
        source: 'src/remark.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Passing unsupported HAST shapes to Rehype'
        mechanism: 'The Rehype transform discovers pre elements whose code child carries a language-* class.'
        wrong_pattern: |
          <code data-lang="tsx">const value = 1</code>
        correct_pattern: |
          <pre><code class="language-tsx">const value = 1</code></pre>
        source: 'docs/guides/markdown-pipelines.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Trimming code differently across rendering paths'
        mechanism: 'Fence and block-data helpers trim trailing whitespace, while highlight preserves the exact input.'
        wrong_pattern: |
          server = highlighter.highlight(code)
          client = renderCodeFence({ code, lang }, highlighter)
        correct_pattern: |
          server = renderCodeFence({ code, lang }, highlighter)
          client = renderCodeFence({ code, lang }, highlighter)
        source: 'docs/guides/ssr-and-client.md'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['integrate-markdown-pipelines', 'integrate-framework-code-blocks']

  - name: 'Integrate framework code blocks'
    slug: 'integrate-framework-code-blocks'
    domain: 'documentation-pipelines'
    description: 'Prepare React or Octane code-block data for server rendering, hydration, and later client content.'
    type: 'composition'
    covers:
      - 'React component data helper'
      - 'Octane component data helper and MDX plugin tuple'
      - 'hydrated SSR and post-hydration highlighting'
      - 'application-owned code block controls and markup insertion'
    tasks:
      - 'Render highlighted code inside a React documentation component'
      - 'Configure synchronous highlighting in an Octane MDX build'
      - 'Reuse server-rendered markup during hydration'
    subsystems:
      - name: 'React'
        package: '@tanstack/highlight/react'
        config_surface: 'Core block options plus an application-owned className.'
      - name: 'Octane components'
        package: '@tanstack/highlight/octane'
        config_surface: 'Core block options plus Octane dangerouslySetInnerHTML data.'
      - name: 'Octane MDX'
        package: '@tanstack/highlight/octane'
        config_surface: 'Synchronous Rehype plugin tuple for @octanejs/mdx.'
    compositions:
      - library: 'React'
        skill: 'integrate-framework-code-blocks'
      - library: '@octanejs/mdx'
        skill: 'integrate-framework-code-blocks'
    failure_modes:
      - mistake: 'Nesting complete markup inside another code block'
        mechanism: 'Adapter htmlMarkup already contains the complete pre and code tree, so wrapping it creates invalid nested block markup.'
        wrong_pattern: |
          const block = createHighlightedCodeBlockProps(options)
          return <pre><code dangerouslySetInnerHTML={{ __html: block.htmlMarkup }} /></pre>
        correct_pattern: |
          const block = createHighlightedCodeBlockProps(options)
          return <div dangerouslySetInnerHTML={{ __html: block.htmlMarkup }} />
        source: 'docs/guides/react.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Passing arbitrary HTML through highlighted markup props'
        mechanism: 'The helper escapes source code, but its HTML insertion contract does not sanitize unrelated HTML.'
        wrong_pattern: |
          <div dangerouslySetInnerHTML={{ __html: userHtml }} />
        correct_pattern: |
          const block = createHighlightedCodeBlockProps({ highlighter, code, lang })
          <div dangerouslySetInnerHTML={{ __html: block.htmlMarkup }} />
        source: 'docs/guides/react.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Highlighting server-rendered blocks again during hydration'
        mechanism: 'Initial highlighted HTML is static and deterministic; rerunning work is unnecessary and can replace hydrated DOM.'
        wrong_pattern: |
          useEffect(() => highlightAllCodeBlocks(), [])
        correct_pattern: |
          const block = createHighlightedCodeBlockProps({ highlighter, code, lang })
        source: 'docs/guides/ssr-and-client.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Passing a bare transformer to Octane MDX'
        mechanism: '@octanejs/mdx expects the plugin tuple returned by createOctaneMdxHighlight.'
        wrong_pattern: |
          rehypePlugins: [rehypeHighlightCodeBlocks({ highlighter })]
        correct_pattern: |
          rehypePlugins: [createOctaneMdxHighlight({ highlighter })]
        source: 'docs/guides/octane.md'
        priority: 'HIGH'
        status: 'active'

  - name: 'Theme and annotate code'
    slug: 'theme-and-annotate-code'
    domain: 'output-presentation'
    description: 'Generate CSS for isolated themes and decorate lines or character ranges in one highlighted tree.'
    type: 'core'
    covers:
      - 'createThemeCss, createThemeRule, and createThemeBaseCss'
      - 'isolated shipped theme imports and custom theme objects'
      - 'line numbers and line decorations'
      - 'character-range decorations and application data attributes'
    tasks:
      - 'Configure light and dark syntax themes without duplicate markup'
      - 'Create and type-check a custom semantic theme'
      - 'Add focused, diff, warning, or diagnostic annotations to code'
    reference_candidates:
      - topic: 'semantic token classes and shipped theme matrix'
        reason: 'Custom themes must provide every semantic token class, and nine isolated themes are shipped.'
    failure_modes:
      - mistake: 'Rendering separate highlighted trees for each theme'
        mechanism: 'Themes only assign CSS variables; token classes and highlighted markup are theme-independent.'
        wrong_pattern: |
          const lightHtml = lightHighlighter.highlightToHtml(code)
          const darkHtml = darkHighlighter.highlightToHtml(code)
        correct_pattern: |
          const html = highlighter.highlightToHtml(code, { lang: 'tsx' })
          const css = createThemeCss({ light: githubLightTheme, dark: githubDarkTheme })
        source: 'docs/guides/themes.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Importing all themes for one selected theme'
        mechanism: 'Each shipped theme has an isolated subpath intended to preserve bundle selection.'
        wrong_pattern: |
          import { draculaTheme } from '@tanstack/highlight/themes'
        correct_pattern: |
          import { draculaTheme } from '@tanstack/highlight/themes/dracula'
        source: 'docs/guides/themes.md'
        priority: 'MEDIUM'
        status: 'active'
      - mistake: 'Defining an incomplete custom theme token record'
        mechanism: 'HighlightTheme requires colors for every semantic class so unsupported tokens cannot silently inherit incorrect colors.'
        wrong_pattern: |
          const theme = { tokens: { keyword: '#f00' } }
        correct_pattern: |
          const theme = {
            name: 'Docs',
            type: 'light',
            background: '#fff',
            foreground: '#111',
            tokens: completeTokenColorRecord,
          } satisfies HighlightTheme
        source: 'docs/guides/themes.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Using zero-based or half-open line decorations'
        mechanism: 'Line coordinates are one-based and inclusive, unlike character ranges.'
        wrong_pattern: |
          { lines: [0, 2], className: 'is-focused' }
        correct_pattern: |
          { lines: [1, 3], className: 'is-focused' }
        source: 'docs/guides/annotations.md'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Expecting annotation classes to include visual styles'
        mechanism: 'The renderer emits stable classes and data attributes, but annotation appearance belongs to application CSS.'
        wrong_pattern: |
          highlighter.highlight(code, { decorations }) // no application CSS
        correct_pattern: |
          .th-line--highlighted { background: rgb(9 105 218 / 10%); }
        source: 'docs/guides/annotations.md'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Extend language support'
    slug: 'extend-language-support'
    domain: 'language-extension'
    description: 'Implement a small language definition or embedded tokenizer using semantic source ranges.'
    type: 'core'
    covers:
      - 'defineLanguage and the TokenRange contract'
      - 'priority-ordered range normalization and source reconstruction'
      - 'TokenizerContext delegation for optional embedded languages'
      - 'isolated exports, fixtures, and bundle or throughput checks'
    tasks:
      - 'Add a custom application language without changing the package core'
      - 'Contribute a focused shipped language module'
      - 'Delegate embedded script or markup regions when dependencies are registered'
    reference_candidates:
      - topic: 'language tokenizer implementation patterns'
        reason: 'The 25 shipped definitions use shared scanners, language-specific regex ranges, and optional recursive delegation.'
    failure_modes:
      - mistake: 'Returning inclusive or character-counted token offsets'
        mechanism: 'Token ranges use zero-based, end-exclusive UTF-16 offsets matching JavaScript string slicing.'
        wrong_pattern: |
          { start: match.index, end: match.index + match[0].length - 1, className: 'keyword' }
        correct_pattern: |
          { start: match.index, end: match.index + match[0].length, className: 'keyword' }
        source: 'docs/guides/custom-languages.md'
        priority: 'CRITICAL'
        status: 'active'
      - mistake: 'Returning overlapping token ranges'
        mechanism: 'The core sorts ranges by source position and drops later overlaps, so a broad earlier range can silently suppress a specific range.'
        wrong_pattern: |
          return [
            { start: 0, end: code.length, className: 'string' },
            { start: 6, end: 10, className: 'keyword' },
          ]
        correct_pattern: |
          return nonOverlappingRanges
        source: 'src/core.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Importing embedded language definitions inside a tokenizer'
        mechanism: 'Direct imports make optional embedded support part of every consumer bundle using the outer definition.'
        wrong_pattern: |
          import { js } from './js.js'
        correct_pattern: |
          if (context.hasLanguage('js')) {
            return context.tokenize(embeddedCode, 'js')
          }
        source: 'docs/guides/custom-languages.md'
        priority: 'CRITICAL'
        status: 'active'
        skills: ['extend-language-support', 'configure-selective-highlighting']
      - mistake: 'Inventing language-specific token class names'
        mechanism: 'Definitions accept only the fixed HighlightTokenClass union so themes remain complete and generic.'
        wrong_pattern: |
          { start, end, className: 'tsx-generic' }
        correct_pattern: |
          { start, end, className: 'type' }
        source: 'src/core.ts'
        priority: 'HIGH'
        status: 'active'
      - mistake: 'Adding a language without focused quality gates'
        mechanism: 'A valid docs tokenizer must reconstruct source, cover common fixtures, remain isolated, and preserve explicit-import budgets.'
        wrong_pattern: |
          export const newLanguage = defineLanguage({ name: 'new', tokenize })
        correct_pattern: |
          // Add isolated export, valid-code fixtures, reconstruction tests,
          // focused regressions, and an explicit-import size measurement.
        source: 'docs/guides/custom-languages.md'
        priority: 'CRITICAL'
        status: 'active'

tensions:
  - name: 'Convenience versus client size'
    skills: ['configure-selective-highlighting', 'integrate-framework-code-blocks']
    description: 'The root entry is easy to adopt, while hydrated clients benefit from direct imports and a minimal registry.'
    implication: 'An agent optimizing only setup simplicity can retain all languages in the browser bundle.'
  - name: 'Structured output versus raw HTML'
    skills: ['integrate-markdown-pipelines', 'integrate-framework-code-blocks']
    description: 'Tree pipelines can remain structured, while framework components may deliberately insert escaped generated HTML.'
    implication: 'An agent can enable raw Markdown HTML unnecessarily or treat arbitrary HTML as equivalent to generated markup.'
  - name: 'Language isolation versus embedding depth'
    skills: ['configure-selective-highlighting', 'extend-language-support']
    description: 'Embedded code improves output only when the application explicitly registers each delegated language.'
    implication: 'An agent can either hide dependencies in a language module or expect unregistered embedded syntax to highlight.'
  - name: 'Exact source versus block normalization'
    skills: ['integrate-markdown-pipelines', 'integrate-framework-code-blocks']
    description: 'Core highlight preserves input, while code-block helpers trim trailing whitespace for copy and render workflows.'
    implication: 'Mixing APIs across server and client can produce different output from the same apparent fence.'

